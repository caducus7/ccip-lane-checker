[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
    "@chainlink/contracts-ccip/=lib/chainlink-ccip/chains/evm/",
    "@chainlink/local/=lib/chainlink-local/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Fork tests: set env vars to canonical public RPCs (see test/fork/README.md):
#   SEPOLIA_RPC=https://ethereum-sepolia-rpc.publicnode.com
#   ARBITRUM_SEPOLIA_RPC=https://arbitrum-sepolia-rpc.publicnode.com
#   BASE_SEPOLIA_RPC=https://base-sepolia-rpc.publicnode.com

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
