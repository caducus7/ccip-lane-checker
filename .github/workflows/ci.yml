name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vv

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  cre:
    name: CRE typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cre/lane-checker-cre
    strategy:
      matrix:
        workflow:
          - round-scheduler
          - hop-sender
          - hop-monitor
          - settlement
          - lane-benchmark
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install
        working-directory: cre/lane-checker-cre/${{ matrix.workflow }}

      - name: Typecheck
        run: bun run typecheck
        working-directory: cre/lane-checker-cre/${{ matrix.workflow }}
